<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RePaiRing WallaH | Premium Document Suite</title>
    <!-- PWA Integration -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#020617" />
    <link rel="apple-touch-icon" href="/App-icon.png" />
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then(reg => console.log("PWA Service Worker registered successfully:", reg.scope))
            .catch(err => console.log("PWA Service Worker registration failed:", err));
        });
      }
    </script>
    <!-- Google Fonts for Ultra Premium Design and Realistic Signature -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased font-sans">
    <div id="root" class="min-h-screen flex flex-col w-full"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
